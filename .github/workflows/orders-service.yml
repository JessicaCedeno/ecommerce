name: orders-service CI/CD

on:
  push:
    branches: [main, develop]
    paths: ['orders-service/**']
  pull_request:
    branches: [main]
    paths: ['orders-service/**']

# ─────────────────────────────────────────────────────────────
# Concurrency: cancel any in-progress run for the same branch
# or PR so stale workflows don't waste runner minutes.
# ─────────────────────────────────────────────────────────────
concurrency:
  group: orders-service-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────
# Default working directory for all run steps inside each job
# that opts in via `defaults`.
# ─────────────────────────────────────────────────────────────
defaults:
  run:
    working-directory: orders-service

jobs:
  # ╔══════════════════════════════════════════════════════════╗
  # ║  CI — lint · build · test  (every push / PR)            ║
  # ╚══════════════════════════════════════════════════════════╝
  ci:
    name: CI (lint · build · test)
    runs-on: ubuntu-latest

    steps:
      # 1 ── Full git history (needed for conventional-commits analysis)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2 ── Node 22 + npm cache keyed on lockfile
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: orders-service/package-lock.json

      # 3 ── Clean install (respects package-lock.json exactly)
      - name: Install dependencies
        run: npm ci

      # 4 ── ESLint
      - name: Lint
        run: npm run lint

      # 4b ── npm audit: flags HIGH or CRITICAL vulnerabilities.
      #        continue-on-error keeps the pipeline green while still
      #        surfacing the findings in the step log.
      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      # 5 ── TypeScript compilation via NestJS CLI
      - name: Build
        run: npm run build

      # 6 ── Jest with coverage; --passWithNoTests avoids false failures
      #       on branches that have no test files yet.
      #       --forceExit ensures Jest doesn't hang on open async handles
      #       (e.g. database connections, timers) left by NestJS modules.
      - name: Test with coverage
        run: npm run test -- --coverage --passWithNoTests --forceExit

      # 7 ── Persist coverage report as a downloadable artifact
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        # Always upload even when tests fail so the report is inspectable
        if: always()
        with:
          name: orders-coverage-report
          path: orders-service/coverage/
          retention-days: 14

      # 8 ── Write a human-readable summary to the Actions run page.
      #       `if: always()` ensures the summary is posted even when a
      #       previous step has failed, giving immediate visibility.
      - name: Job summary
        if: always()
        run: |
          echo "## Orders Service CI Results" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY

  # ╔══════════════════════════════════════════════════════════╗
  # ║  RELEASE — version bump · changelog · Docker build      ║
  # ║  Runs only on push to main AFTER ci passes              ║
  # ╚══════════════════════════════════════════════════════════╝
  release:
    name: Release (version · changelog · docker)
    runs-on: ubuntu-latest
    needs: ci
    # Only execute on direct pushes to main (not on PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    # Write permission is required to push the version-bump commit and tag
    permissions:
      contents: write

    steps:
      # 1 ── Full history so standard-version can walk all commits
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use the built-in token so the push later is authenticated
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2 ── Configure git identity for the automated commit
      - name: Configure git user
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
        # working-directory default applies here too

      # 3 ── Node 22 + npm cache
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: orders-service/package-lock.json

      # 4 ── Install all deps (including standard-version devDep)
      - name: Install dependencies
        run: npm ci

      # 4b ── Compile the project before bumping the version so we catch
      #        any TypeScript errors that would break the release artifact.
      - name: Build (release verification)
        run: npm run build

      # 5 ── Bump version, update CHANGELOG.md, and create the git tag.
      #       standard-version reads .versionrc.json for tagPrefix and
      #       changelog config.  The commit message contains [skip ci]
      #       so this push does NOT re-trigger the workflow (infinite loop
      #       prevention).
      - name: Bump version & generate CHANGELOG
        run: |
          npx standard-version \
            --releaseCommitMessageFormat "chore(release): {{currentTag}} [skip ci]"

      # 6 ── Pull any commits that landed while CI was running (e.g. the
      #       other service's release job), then push our bump commit and tag.
      #       The rebase is safe because each service only touches its own
      #       package.json and CHANGELOG.md — no cross-service conflicts.
      - name: Push version commit and tag
        run: |
          git pull --rebase origin main
          git push --follow-tags origin main

      # 7 ── Extract the version that standard-version just wrote so we
      #       can tag the Docker image with it.
      - name: Read new version from package.json
        id: pkg
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      # 8 ── Enable Docker BuildKit (needed for multi-stage cache)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 9 ── Build the multi-stage image (production target).
      #       push: false  →  image is built & verified locally only;
      #       load: true   →  loads the image into the local Docker daemon
      #       so the smoke-test step can run it with `docker run`.
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./orders-service
          file: ./orders-service/Dockerfile
          target: production
          push: false
          load: true
          # Two tags: the exact semver and the rolling 'latest'
          tags: |
            orders-service:${{ steps.pkg.outputs.version }}
            orders-service:latest
          # Layer cache backed by GitHub Actions cache
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 10 ── Run the freshly built image with production env vars to
      #        verify the Node.js process starts without crashing.
      #        Uses `node -e` instead of the full server boot to keep the
      #        step fast and free of external service dependencies.
      #        PRODUCTS_SERVICE_URL reflects the inter-service dependency
      #        that orders-service has at runtime.
      - name: Smoke test (deployment simulation)
        run: |
          docker run --rm \
            -e NODE_ENV=production \
            -e DB_HOST=localhost \
            -e JWT_SECRET=ci-test-secret \
            -e PRODUCTS_SERVICE_URL=http://localhost:3001 \
            orders-service:${{ steps.pkg.outputs.version }} \
            node -e "console.log('orders-service deployment simulation OK')"

